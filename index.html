<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kent Bilişim Online | Profesyonel Donanım Merkezi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151f32;
            --border-color: #24344d;
            --text-color: #f8fafc;
            --text-muted: #64748b;
            --primary: #2563eb;
            --primary-glow: rgba(37, 99, 235, 0.2);
            --whatsapp-green: #25d366;
            --accent: #34d399;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1.2rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-color);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo span { color: var(--primary); }

        /* --- ÜST ARAMA ALANI (KATEGORİ BUTONLARI KALDIRILDI) --- */
        .hero-search-section {
            background: linear-gradient(180deg, var(--card-bg) 0%, var(--bg-color) 100%);
            padding: 4rem 2rem 3rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .hero-search-section h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
        }

        .search-wrapper {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .search-wrapper input {
            width: 100%;
            padding: 1.1rem 1.5rem 1.1rem 3.5rem;
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-size: 1.05rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .search-wrapper i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        /* --- MERKEZİ İLANLARIN LİSTELENDİĞİ ALAN --- */
        .main-layout {
            max-width: 1400px;
            margin: 2.5rem auto;
            padding: 0 2rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            align-content: start;
        }

        .product-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.5);
            border-color: #3b82f6;
        }

        .img-container {
            width: 100%;
            height: 220px;
            background-color: #090d16;
            position: relative;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background-color: rgba(0, 0, 0, 0.75);
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .badge.zero { color: var(--accent); border: 1px solid var(--accent); }
        .badge.used { color: #f59e0b; border: 1px solid #f59e0b; }

        .card-details {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-cat {
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .card-name {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            height: 2.8rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: #f1f5f9;
        }

        .card-price {
            font-size: 1.4rem;
            font-weight: 800;
            margin-top: auto;
            color: #ffffff;
        }

        /* --- FULLSCREEN DETAIL PANEL --- */
        .fullscreen-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(4,6,11,0.92);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 1.5rem;
        }

        .fullscreen-modal.active { opacity: 1; pointer-events: auto; }

        .modal-box {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            width: 100%; max-width: 950px;
            border-radius: 16px;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            overflow: hidden;
            position: relative;
        }

        .modal-close {
            position: absolute; top: 15px; right: 15px;
            background: #1e293b; border: none; color: white;
            width: 40px; height: 40px; border-radius: 50%;
            font-size: 1.3rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            z-index: 10;
        }

        .modal-view-left { width: 100%; height: 100%; min-height: 400px; }
        .modal-view-left img { width: 100%; height: 100%; object-fit: cover; }

        .modal-view-right { padding: 3rem; display: flex; flex-direction: column; justify-content: center; }
        .modal-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 1rem; }
        .modal-price { font-size: 2rem; font-weight: 800; color: var(--accent); margin-bottom: 1.5rem; }
        .modal-desc { color: #94a3b8; font-size: 1rem; margin-bottom: 2.5rem; line-height: 1.6; }
        
        .whatsapp-btn {
            background-color: var(--whatsapp-green);
            color: white; text-decoration: none;
            padding: 1rem; border-radius: 8px;
            font-weight: 600; text-align: center;
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            font-size: 1.05rem;
            transition: background 0.2s;
        }
        .whatsapp-btn:hover { background-color: #1ebd56; }

        @media (max-width: 950px) {
            .modal-box { grid-template-columns: 1fr; }
            .modal-view-left { height: 250px; min-height: auto; }
            .modal-view-right { padding: 2rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <a href="#" class="logo">KENT BİLİŞİM <span>ONLINE</span></a>
        </div>
    </header>

    <section class="hero-search-section">
        <h1>Aradığınız Donanımı Anında Bulun</h1>
        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchBar" oninput="applyFilters()" placeholder="Ekran kartı, işlemci, bellek veya marka arayın...">
        </div>
    </section>

    <div class="main-layout">
        <main class="products-grid" id="productsGrid">
            </main>
    </div>

    <div class="fullscreen-modal" id="productDetailOverlay">
        <div class="modal-box">
            <button class="modal-close" onclick="closeDetailPanel()">&times;</button>
            <div class="modal-view-left">
                <img src="" alt="" id="detailImg">
            </div>
            <div class="modal-view-right">
                <span id="detailCategory" style="font-size: 0.8rem; text-transform:uppercase; color:var(--primary); font-weight:700;"></span>
                <h2 class="modal-title" id="detailTitle"></h2>
                <div class="modal-price" id="detailPrice"></div>
                <p class="modal-desc" id="detailDesc"></p>
                <a href="#" class="whatsapp-btn" id="detailWhatsAppBtn" target="_blank">
                    <i class="fa-brands fa-whatsapp"></i> Bu Donanım İçin İletişime Geç
                </a>
            </div>
        </div>
    </div>

    <script>
        const whatsappNumber = "905459260576"; 

        // TÜM İLANLARIN LİSTESİ (images/urunX.jpeg şeklinde adlandırabilirsin)
        const products = [
            // EKRAN KARTLARI
            { id: 1, title: "SAPPHİRE NİTRO RX480 8GB", category: "ekran-kartı", condition: "İkinci El ", price: 2000, img: "urun1.jpeg", desc: "TEK FANLI SORUNSUZ FURMARK 72 DERECE SABİT ANKARA İÇİ ELDEN TESLİM  HAVALE SONRASI KARGO" },
            { id: 2, title: "XFX R9 390 8GB ", category: "ekran-kartı", condition: "İkinci El", price: 2000, img: "urun2.jpeg", desc: "KUTUSU YOK FANLAR ZOKO SIFIR FURMARK 60 DERECE SABİT " },
            { id: 3, title: "ASUS ROG STRİX RX570 8GB ", category: "ekran-kartı", condition: "İkinci El", price: 3000, img: "urun3.jpeg", desc: "FURMARK 65-75 DERECE" },
            { id: 4, title: "MSI GAMİNG RX470 8GB", category: "ekran-kartı", condition: "İkinci El", price: 1000, img: "urun4.jpeg", desc: "KART BOZUK SORUNU BİLİNMİYOR" },

            // İŞLEMCİLER
            { id: 5, title: "İNTEL CORE İ3-7100", category: "işlemci", condition: "İkinci El", price: 500, img: "urun5.jpeg", desc: "2 Çekirdek Sorunsuzdur" },

            // ANAKARTLAR
            { id: 8, title: "GİGABYTE B450M H ANAKART", category: "anakart", condition: "İkinci El", price: 2000, img: "urun8.jpeg", desc: "Sorunsuz Kutulu Ve Test Edilmiştir" },

            // RAM BELLEKLER
            { id: 10, title: "TWİNMOS DDR4 8GB 2666MHZ RAM", category: "ram", condition: "İkinci El", price: 1400, img: "urun6.jpeg", desc: "Ürün Sorunsuz Test Edilmiştir" },
            { id: 11, title: "G.SKİLL RİPJAVS DDR4 8GB 2400MHZ RAM", category: "ram", condition: "İkinci El", price: 1400, img: "urun7.jpeg", desc: "Ürün Sorunsuz Test Edilmiştir" },

            // DEPOLAMA SSD
            { id: 12, title: "TOSHİBA 240GB SSD", category: "depolama", condition: "İkinci El", price: 1000, img: "urun9.jpeg", desc: "Sağlık 89 Ve Üzeridir Test Edilmiş Sorunsuz Bir Şekilde Çalışmaktadır" },

            // KASA & SOGUTMA
            { id: 14, title: "GAME İN GAME DREAM", category: "kasa", condition: "İkinci El", price: 2000, img: "urun10.jpeg", desc: "Kasanın Fanı Bulunmamaktadır Kutusu Vardır" },
        ];

        // SİTE AÇILDIĞINDA DOĞRUDAN TÜM ÜRÜNLERİ LİSTELE
        document.addEventListener("DOMContentLoaded", () => {
            renderProducts(products);
        });

        // ÜRÜNLERİ VİTRİNE BASMA FONKSİYONU
        function renderProducts(data) {
            const grid = document.getElementById("productsGrid");
            grid.innerHTML = "";

            if(data.length === 0) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color:var(--text-muted); padding: 5rem; font-size:1.1rem;">Aradığınız kriterlerde bir ilan bulunamadı.</p>`;
                return;
            }

            data.forEach(product => {
                const card = document.createElement("div");
                card.className = "product-card";
                card.onclick = () => openDetailPanel(product.id);
                
                const badgeClass = product.condition === 'Sıfır' ? 'zero' : 'used';

                card.innerHTML = `
                    <div class="img-container">
                        <span class="badge ${badgeClass}">${product.condition}</span>
                        <img src="${product.img}" alt="${product.title}">
                    </div>
                    <div class="card-details">
                        <span class="card-cat">${product.category.replace('-', ' ')}</span>
                        <h2 class="card-name">${product.title}</h2>
                        <div class="card-price">${product.price.toLocaleString('tr-TR')} TL</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // AKILLI ARAMA MOTORU (Yazıldığı an listeden eşleştirir)
        function applyFilters() {
            const searchVal = document.getElementById("searchBar").value.toLowerCase().trim();

            const filtered = products.filter(p => {
                return p.title.toLowerCase().includes(searchVal) || 
                       p.desc.toLowerCase().includes(searchVal) || 
                       p.category.toLowerCase().includes(searchVal);
            });

            renderProducts(filtered);
        }

        // DETAY PENCERESİNİ AÇMA
        function openDetailPanel(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;

            const overlay = document.getElementById("productDetailOverlay");
            
            document.getElementById("detailImg").src = product.img;
            document.getElementById("detailCategory").textContent = `${product.category.replace('-', ' ')} | ${product.condition}`;
            document.getElementById("detailTitle").textContent = product.title;
            document.getElementById("detailPrice").textContent = product.price.toLocaleString('tr-TR') + " TL";
            document.getElementById("detailDesc").textContent = product.desc;

            const message = `Merhaba, Kent Bilişim Online sitenizde gördüğüm "${product.title}" (${product.condition}) ilanı hakkında görüşmek istiyorum.`;
            document.getElementById("detailWhatsAppBtn").href = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;

            overlay.classList.add("active");
            document.body.style.overflow = "hidden"; 
        }

        function closeDetailPanel() {
            const overlay = document.getElementById("productDetailOverlay");
            overlay.classList.remove("active");
            document.body.style.overflow = "auto"; 
        }

        document.getElementById("productDetailOverlay").addEventListener("click", function(event) {
            if (event.target === this) closeDetailPanel();
        });
    </script>
</body>
</html>
